<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftFill Test Form</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        background: #f7f7f7;
        color: #111827;
      }
      body {
        margin: 0;
        padding: 3rem 1.5rem;
        display: grid;
        place-content: center;
      }
      form {
        background: white;
        border-radius: 12px;
        border: 1px solid #d1d5db;
        padding: 2rem;
        box-shadow: 0 20px 30px -28px rgba(15, 23, 42, 0.45);
        width: min(640px, 100%);
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin-top: 0;
        margin-bottom: 2rem;
        color: #6b7280;
      }
      .grid {
        display: grid;
        gap: 1rem;
      }
      label {
        display: grid;
        gap: 0.4rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #374151;
      }
      input,
      select {
        appearance: none;
        border: 1px solid #cbd5f5;
        border-radius: 0.65rem;
        padding: 0.65rem 0.85rem;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #f9fafb;
        color: #111827;
      }
      input:focus,
      select:focus {
        border-color: #2563eb;
        outline: none;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        background: white;
      }
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-text-fill-color: #111827;
        transition: background-color 9999s ease-in-out 0s;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
      }
      .radio-group,
      .checkbox-group {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      .actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
      }
      button {
        border: none;
        border-radius: 0.75rem;
        padding: 0.85rem 1.6rem;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        background: #2563eb;
        color: white;
        box-shadow: 0 12px 18px -12px rgba(37, 99, 235, 0.8);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 18px -16px rgba(37, 99, 235, 0.85);
      }
      button.secondary {
        background: white;
        border: 1px solid #2563eb;
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <form>
      <h1>Global Entry Application</h1>
      <p>Debug form for SwiftFill Vault. Populate fields manually or trigger the extension.</p>

      <div class="grid">
        <div class="row">
          <label>
            Full name
            <input name="full_name" placeholder="Full name" autocomplete="name" />
          </label>
          <label>
            First name
            <input name="first_name" autocomplete="given-name" />
          </label>
        </div>

        <div class="row">
          <label>
            Middle name
            <input name="middlename" />
          </label>
          <label>
            Last name
            <input id="familyName" name="last_name" autocomplete="family-name" />
          </label>
        </div>

        <div class="row">
          <label>
            Primary email
            <input name="emailAddress" type="email" autocomplete="email" />
          </label>
          <label>
            Work email
            <input name="work_email" type="email" autocomplete="work-email" />
          </label>
          <label>
            Phone number
            <input name="phoneNumber" type="tel" autocomplete="tel" />
          </label>
        </div>

        <div class="row">
          <label>
            Date of birth
            <input name="dateOfBirth" type="date" />
          </label>
          <label>
            Gender
            <select name="gender">
              <option value="">Select…</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="non-binary">Non-binary</option>
            </select>
          </label>
          <label>
            Nationality
            <input name="nationality" />
          </label>
        </div>

        <div class="row">
          <label>
            Passport number
            <input name="passportNumber" />
          </label>
          <label>
            Known Traveler Number
            <input name="knownTravelerNumber" />
          </label>
        </div>

        <fieldset class="grid" style="border: none; padding: 0; margin: 0;">
          <legend style="font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; color: #374151;">
            Residential Address
          </legend>
          <label>
            Address line 1
            <input name="addressLine1" autocomplete="address-line1" />
          </label>
          <label>
            Address line 2
            <input name="addressLineTwo" autocomplete="address-line2" />
          </label>
          <div class="row">
            <label>
              City
              <input name="city" autocomplete="address-level2" />
            </label>
            <label>
              State / Province
              <input name="state" autocomplete="address-level1" />
            </label>
            <label>
              Postal / ZIP code
              <input name="postalcode" autocomplete="postal-code" />
            </label>
            <label>
              Country
              <input name="country" autocomplete="country-name" />
            </label>
          </div>
        </fieldset>

        <fieldset class="grid" style="border: none; padding: 0; margin: 0;">
          <legend style="font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; color: #374151;">
            Employment
          </legend>
          <div class="row">
            <label>
              Company
              <input name="company" />
            </label>
            <label>
              Job title
              <input name="jobtitle" />
            </label>
          </div>
        </fieldset>

        <fieldset class="grid" style="border: none; padding: 0; margin: 0;">
          <legend style="font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; color: #374151;">
            Custom
          </legend>
          <div class="row">
            <label>
              Favorite airline
              <input
                name="favorite_airline"
                placeholder="Favorite airline"
                aria-label="Favorite airline"
              />
            </label>
          </div>
        </fieldset>
      </div>

      <div class="actions">
        <button type="submit">Submit sample</button>
        <button class="secondary" type="reset">Reset</button>
      </div>
    </form>
  </body>
</html>
